<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High & Low Game</title>
    <link rel="stylesheet" href="High&Low.css">
</head>
<body>
    <div class="game-container">
        <h1>HIGH & LOW</h1>

        <div id="login-area" style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <h2 style="font-size: 1.5rem; margin-bottom: 15px; color: #ffd700;">👤 ユーザーログイン</h2>
            <div style="margin-bottom: 15px;">
                <input type="text" id="username-input" placeholder="ユーザー名を入力" style="padding: 8px 12px; border-radius: 5px; border: none; width: 70%; font-size: 1rem;">
                <button class="btn btn-just" id="btn-login" style="padding: 8px 15px; margin-left: 5px;">ログイン</button>
            </div>
            <div id="user-select-container" style="display: none; font-size: 0.9rem;">
                <label for="user-select">登録済みユーザーから選ぶ: </label>
                <select id="user-select" style="padding: 5px; border-radius: 5px; margin-left: 5px; background: #2a2a40; color: white; border: 1px solid #4cc9f0;"></select>
            </div>
        </div>

        <div id="user-status-area" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem;">
            <span>プレイヤー: <strong id="current-user-display" style="color: #ffb703;">---</strong></span>
            <button id="btn-logout" style="background: transparent; border: none; color: #ff4b2b; cursor: pointer; text-decoration: underline;">ログアウト</button>
        </div>

        <div id="game-play-area" style="display: none;">
            <div class="score-board">
                <p>連勝数: <span id="streak">0</span> (最高: <span id="max-streak">0</span>)</p>
                <p>所持コイン: <span id="coins">100</span> 枚 (最高: <span id="max-coins">100</span>)</p>
                <p>シールド: <span id="shield-status" style="color: #4cc9f0;">🛡️ なし</span></p>
            </div>

            <div class="bet-area">
                <label for="bet-input">ベットする枚数: </label>
                <input type="number" id="bet-input" value="10" min="1">
            </div>

            <div class="card-area">
                <div class="card" id="current-card">
                    <img id="current-card-img" src="" alt="現在のカード">
                </div>
                <div class="card" id="next-card">
                    <div class="card-inner" id="next-card-inner">
                        <div class="card-face card-back">?</div>
                        <div class="card-face card-front">
                            <img id="next-card-img" class="card-img" src="" alt="次のカード">
                        </div>
                    </div>
                </div>
            </div>

            <p class="message" id="message">次のカードは、今より高い？低い？</p>

            <div class="skill-area">
                <button class="btn-skill" id="btn-pass">🌀 パスする (残り <span id="pass-count">1</span> 回)</button>
            </div>

            <div class="btn-group">
                <button class="btn btn-high" id="btn-high">HIGH (高い)</button>
                <button class="btn btn-just" id="btn-just">JUST (同じ)</button>
                <button class="btn btn-low" id="btn-low">LOW (低い)</button>
            </div>
            
            <div id="double-up-group" style="display: none; margin-top: 20px;">
                <p style="color: #ffd700; font-weight: bold; margin-bottom: 10px;">
                    ダブルアップ中！ 現在の配当: <span id="pool-coins">0</span> コイン
                </p>
                <div class="btn-group">
                    <button class="btn btn-high" id="btn-collect">コレクト（コインを確定して戻る）</button>
                    <button class="btn btn-just" id="btn-double-continue">ダブルアップを続ける</button>
                </div>
            </div>

            <button class="btn btn-reset" id="btn-reset" style="display: none;">もう一度遊ぶ</button>

            <div id="mission-board" style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; margin-top: 25px; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1);">
                <h3 style="font-size: 1.1rem; color: #ffd700; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between;">
                    <span>📅 本日のデイリーミッション (5つ)</span>
                    <span id="mission-date" style="font-size: 0.8rem; color: #888899;">----/--/--</span>
                </h3>
                <p style="font-size: 0.75rem; color: #aaa; margin-bottom: 12px;">※毎日日付が変わると新しいミッションに切り替わります</p>
                <ul id="mission-list" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem; display: flex; flex-direction: column; gap: 8px;">
                    <!-- ここにJavaScriptで動的に5つのミッションが生成されます -->
                </ul>
            </div>
        </div>
    </div>

    <script src="High&Low.js"></script>
</body>
</html>
